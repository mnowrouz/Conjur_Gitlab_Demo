retrieve_secret:       # This job runs in the build stage, which runs first.
  stage: retrieve
  script:
    - |
      echo "RETRIEVING SECRET"
      SECRET=$(curl -k \
      --header "Authorization:Token token=\"${AUTHN_TOKEN}\"" \
      --header "Accept-Encoding: base64" \
      -X GET "https://10.0.0.198/secrets/majorkey_dev/variable/gitlab%2Fgitlab_test_variable")
      echo "SECRET=$SECRET"
      echo "SECRET RETRIEVED"
  tags:
    - jwt



   
   



