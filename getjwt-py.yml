getjwt-job:
  stage: getjwt
  image: cyberark/authn-jwt-gitlab:alpine-1.0.0

  id_tokens:
    MY_ID_TOKEN:
      aud: "https://ip-10-0-0-167.ec2.internal"

  variables:
    CONJUR_AUTHN_JWT_TOKEN: $MY_ID_TOKEN

  script:
    - echo "=== Install helper packages for JWT inspection ==="
    - apk add --no-cache python3 curl

    - echo "=== RAW JWT (POC ONLY - REMOVE LATER) ==="
    - echo "$MY_ID_TOKEN"

    - echo "=== JWT HEADER ==="
    - |
      python3 - <<'PY'
      import os, json, base64
      token = os.environ["MY_ID_TOKEN"]
      parts = token.split(".")
      header = parts[0] + "=" * (-len(parts[0]) % 4)
      print(json.dumps(json.loads(base64.urlsafe_b64decode(header)), indent=2))
      PY

    - echo "=== JWT PAYLOAD ==="
    - |
      python3 - <<'PY'
      import os, json, base64
      token = os.environ["MY_ID_TOKEN"]
      parts = token.split(".")
      payload = parts[1] + "=" * (-len(parts[1]) % 4)
      print(json.dumps(json.loads(base64.urlsafe_b64decode(payload)), indent=2))
      PY