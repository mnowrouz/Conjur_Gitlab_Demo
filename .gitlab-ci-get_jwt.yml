conjur-test:
  stage: test
  image: cyberark/authn-jwt-gitlab:alpine-1.0.0
  tags:
    - jwt

  id_tokens:
    MY_ID_TOKEN:
      aud: "https://ip-10-0-0-167.ec2.internal"

  variables:
    CONJUR_AUTHN_JWT_TOKEN: $MY_ID_TOKEN

  script:
    - echo "=== Basic variable checks ==="
    - test -n "$CONJUR_APPLIANCE_URL"
    - test -n "$CONJUR_ACCOUNT"
    - test -n "$CONJUR_AUTHN_JWT_SERVICE_ID"
    - test -n "$CONJUR_AUTHN_JWT_TOKEN"

    - echo "=== Install helper packages for JWT inspection ==="
    - apk add --no-cache python3 curl

    - echo "=== Conjur connectivity check ==="
    - getent hosts ip-10-0-0-167.ec2.internal || true
    - curl -vkI "$CONJUR_APPLIANCE_URL" || true

    - echo "=== RAW JWT (POC ONLY - REMOVE LATER) ==="
    - echo "$MY_ID_TOKEN"

    - echo "=== JWT HEADER ==="
    - |
      python3 - <<'PY'
      import os, json, base64
      token = os.environ["MY_ID_TOKEN"]
      parts = token.split(".")
      header = parts[0] + "=" * (-len(parts[0]) % 4)
      print(json.dumps(json.loads(base64.urlsafe_b64decode(header)), indent=2))
      PY

    - echo "=== JWT PAYLOAD ==="
    - |
      python3 - <<'PY'
      import os, json, base64
      token = os.environ["MY_ID_TOKEN"]
      parts = token.split(".")
      payload = parts[1] + "=" * (-len(parts[1]) % 4)
      print(json.dumps(json.loads(base64.urlsafe_b64decode(payload)), indent=2))
      PY

    - echo "=== Retrieve secret from Conjur ==="
    - export TEST_PASSWORD="$(CONJUR_SECRET_ID='gitlab/gitlab_test_variable' /authn-jwt-gitlab)"
    - test -n "$TEST_PASSWORD"
    - echo "Secret retrieved successfully"